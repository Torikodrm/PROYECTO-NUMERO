<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Adivinanza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ADIVINA EL NUMERO</h1>
        <p>He pensado un número entre 1 y 100. ¡Intenta adivinarlo!</p>
        <input type="number" id="guessInput" placeholder="SI NO ADIVINAS ERES GEI">
        <button id="checkButton">ADIVINAR</button>
        <p id="message"></p>
    </div>

    <div class="container" id="numerodeintentos">
        <h1>CONTEO DE INTENTOS</h1>
         <p id="intentos">0</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
