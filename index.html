<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Adivinanza</title>
 <link rel="stylesheet" href="styles.css">
 <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" id="numerodeintentos">
        <h2>CONTEO DE INTENTOS</h2>
        <p id="intentos">0</p>
    </div>

    <div class="container" id="principal">
        <h1> <img src="imagenes/imagen-removebg-preview.png"> ADIVINA EL NUMERO <img src="imagenes/palmera-removebg-preview.png" alt=""></h1>
        <p id="summary"> He pensado un número entre 1 y 100. ¡Intenta adivinarlo! </p>
        <input type="number" id="guessinput" placeholder="Ingresa un número">
        <button id="checkButton"><img src="imagenes/palmera-removebg-preview.png" alt="adivinar" id="palmera">ADIVINAR<img src="imagenes/palmera-removebg-preview.png" alt="adivinar" id="palmera"></button> 
        <p id="message"></p>
    </div>

    <div class="container" id="pistas">
        <h3>PISTAS</h3>
        <p id="pista1">un numero mayor que </p>
        <p id="pista2">un numero menor que </p>
    </div>
    <script src="java.js"></script>
</body>
</html>
