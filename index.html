<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Adivinanza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ADIVINA EL NUMERO</h1>
    </div>



    <div class="container">
        <h1>Adivina el Número</h1>
        <p>He pensado un número entre 1 y 100. ¡Intenta adivinarlo!</p>
        
        <input type="number" id="guessInput" placeholder="Escribe tu número">
        <button id="checkButton">Comprobar</button>
        
        <p id="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
